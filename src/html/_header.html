<header class="header">


    <div class="header__container">
        <div class="header__inner">

            <a href="/" class="header__logo">
                <img src="img/logo.svg" alt="Monblan Project">
            </a>

            <div class="header__content">

                <div class="header__top">
                    <h1 class="header__title">
                        monblanproject
                    </h1>

                    <span class="header__badge">
                        Start on 17-02-2016
                    </span>
                </div>

                <div class="header__stats">

                    <div class="header__stat">
                        <strong>870</strong> posts
                    </div>

                    <div class="header__stat">
                        <strong>11,787</strong> followers
                    </div>

                    <div class="header__stat">
                        <strong>112</strong> following
                    </div>

                </div>

                <div class="header__filters">
                    <span class="header__label">Date</span>
                    <div class="header__actions">
                        <div class="header__field">
                            <label class="visually-hidden" for="date-from">Date from </label>
                            <input class="header__date js-datepicker" id="date-from" type="text" placeholder="from">


                            <button class="header__clear" type="button">
                                <img src="img/date-icons/close.svg" alt="Icon close">
                            </button>

                            <button class="header__calendar" type="button">
                                <img src="img/date-icons/calendar.svg" alt="Icon calendar">
                            </button>
                        </div>


                        <div class="header__field">
                            <label class="visually-hidden" for="date-to"> Date to</label>
                            <input class="header__date js-datepicker" id="date-to" type="text" placeholder="09_08_2016">


                            <button class="header__clear" type="button">
                                <img src="img/date-icons/close.svg" alt="Icon close">
                            </button>

                            <button class="header__calendar" type="button">
                                <img src="img/date-icons/calendar.svg" alt="Icon calendar">
                            </button>

                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</header>
